<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recurring Meeting Spinner</title>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #5b5fc7;
      --accent-dark: #4144a3;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%, #ececf7 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrap {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(17, 24, 39, 0.12);
      padding: 32px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .spinner-area {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      justify-items: center;
    }

    .wheel-holder {
      position: relative;
      width: min(520px, 82vw);
      aspect-ratio: 1 / 1;
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 42px solid var(--text);
      z-index: 3;
      filter: drop-shadow(0 3px 3px rgba(0,0,0,0.18));
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 12px solid #ffffff;
      box-shadow: inset 0 0 0 2px var(--border), 0 16px 40px rgba(31, 41, 55, 0.18);
      transition: transform 4s cubic-bezier(.16,.85,.2,1);
      position: relative;
      overflow: hidden;
      background: conic-gradient(
        #5b5fc7 0deg 32.727deg,
        #f59e0b 32.727deg 65.454deg,
        #10b981 65.454deg 98.181deg,
        #ef4444 98.181deg 130.908deg,
        #8b5cf6 130.908deg 163.635deg,
        #06b6d4 163.635deg 196.362deg,
        #ec4899 196.362deg 229.089deg,
        #84cc16 229.089deg 261.816deg,
        #f97316 261.816deg 294.543deg,
        #14b8a6 294.543deg 327.27deg,
        #6366f1 327.27deg 360deg
      );
    }

    .wheel::after {
      content: "";
      position: absolute;
      inset: 24%;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 0 2px var(--border), 0 6px 18px rgba(0,0,0,0.12);
    }

    .label {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50%;
      transform-origin: 0 0;
      text-align: right;
      padding-right: 18px;
      color: white;
      font-weight: 700;
      font-size: clamp(0.7rem, 1.8vw, 1rem);
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
      z-index: 2;
      pointer-events: none;
    }

    .center-text {
      position: absolute;
      inset: 37%;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      z-index: 4;
      box-shadow: 0 4px 14px rgba(0,0,0,0.14);
      color: var(--accent);
      font-size: clamp(0.8rem, 2.2vw, 1.25rem);
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .spin-btn {
      background: var(--accent);
      color: #ffffff;
    }

    .spin-btn:hover {
      background: var(--accent-dark);
    }

    .reset-btn {
      background: #eef2ff;
      color: var(--accent-dark);
    }

    .result {
      margin-top: 24px;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: #fafafa;
      min-height: 104px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .result .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .winner {
      font-size: clamp(2rem, 7vw, 4.5rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .names {
      margin-top: 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .chip {
      background: #f3f4f6;
      border: 1px solid var(--border);
      color: #374151;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 22px;
      }

      .label {
        padding-right: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Meeting Spinner</h1>
    <p class="subtitle">Click spin and let the wheel make the call.</p>

    <section class="spinner-area">
      <div class="wheel-holder">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="center-text">SPIN</div>
      </div>

      <div class="controls">
        <button class="spin-btn" id="spinBtn">Spin the Wheel</button>
        <button class="reset-btn" id="resetBtn">Reset</button>
      </div>
    </section>

    <section class="result" aria-live="polite">
      <div class="eyebrow">Selected</div>
      <div class="winner" id="winner">Ready?</div>
    </section>

    <div class="names" id="names"></div>
  </main>

  <script>
    const options = ["Stan", "Vanessa", "Hamza", "Annesy", "Pib", "Clara", "Lauren", "Benny", "Maria", "Sandrine", "MC"];
    const wheel = document.getElementById("wheel");
    const winner = document.getElementById("winner");
    const spinBtn = document.getElementById("spinBtn");
    const resetBtn = document.getElementById("resetBtn");
    const names = document.getElementById("names");

    const segment = 360 / options.length;
    let currentRotation = 0;
    let spinning = false;

    options.forEach((name, index) => {
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = name;
      label.style.transform = `rotate(${index * segment + segment / 2}deg) translate(-50%, -50%)`;
      wheel.appendChild(label);

      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = name;
      names.appendChild(chip);
    });

    function spin() {
      if (spinning) return;
      spinning = true;
      winner.textContent = "Spinning...";
      spinBtn.disabled = true;

      const chosenIndex = Math.floor(Math.random() * options.length);
      const chosenCenter = chosenIndex * segment + segment / 2;
      const pointerAt = 270;
      const extraSpins = 6 + Math.floor(Math.random() * 4);
      const finalRotation = extraSpins * 360 + (pointerAt - chosenCenter);

      currentRotation += finalRotation;
      wheel.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        winner.textContent = options[chosenIndex];
        spinning = false;
        spinBtn.disabled = false;
      }, 4100);
    }

    function reset() {
      if (spinning) return;
      currentRotation = 0;
      wheel.style.transform = "rotate(0deg)";
      winner.textContent = "Ready?";
    }

    spinBtn.addEventListener("click", spin);
    resetBtn.addEventListener("click", reset);
  </script>
</body>
</html>
